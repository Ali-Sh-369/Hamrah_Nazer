<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1565C0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>همراه ناظر میدانی</title>
  
  <link rel="manifest" href="manifest.json">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/vazirmatn-with-font-face.css" />

  <style>
    :root {
      --bg-color: #f5f7fb;
      --surface-color: #ffffff;
      --text-color: #212121;
      --primary-color: #1565c0;
      --border-color: #e0e0e0;
    }

    [data-theme="dark"] {
      --bg-color: #121212;
      --surface-color: #1e1e1e;
      --text-color: #e0e0e0;
      --primary-color: #90caf9;
      --border-color: #333333;
    }

    body {
      margin: 0;
      font-family: Vazirmatn, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background-color: var(--primary-color);
      color: #fff;
      padding: 10px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      z-index: 1000;
    }

    .header-title { font-weight: bold; font-size: 1.1rem; }
    .header-actions { display: flex; gap: 12px; align-items: center; }
    
    .btn-icon {
      background: none;
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
    }

    #login-screen, #main-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 50px);
    }

    .hidden { display: none !important; }

    .login-container {
      margin: auto;
      background: var(--surface-color);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 85%;
      max-width: 400px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 15px;
      text-align: right;
    }

    .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      box-sizing: border-box;
      background: var(--bg-color);
      color: var(--text-color);
    }

    .btn-block {
      width: 100%;
      padding: 12px;
      background: #1565c0;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    #workspace {
      display: flex;
      flex-direction: column;
      flex: 1;
      position: relative;
    }

    #map { flex: 1; z-index: 1; }

    /* استایل نقشه در حالت دارک مود */
    [data-theme="dark"] .leaflet-layer,
    [data-theme="dark"] .leaflet-control-zoom {
      filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
    }

    #panel {
      background: var(--surface-color);
      border-top: 1px solid var(--border-color);
      padding: 15px;
      max-height: 45vh;
      overflow-y: auto;
      z-index: 100;
      box-shadow: 0 -3px 10px rgba(0,0,0,0.05);
    }

    .timer-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-color);
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .timer-digits { font-family: monospace; font-size: 1.3rem; font-weight: bold; }

    .btn-action {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .btn-success { background: #2e7d32; color: white; }
    .btn-warning { background: #ef6c00; color: white; }
    .btn-danger { background: #c62828; color: white; }
    .btn-secondary { background: #757575; color: white; }

    .location-details {
      border: 1px solid var(--border-color);
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .image-gallery {
      display: flex;
      gap: 10px;
      margin: 10px 0;
      overflow-x: auto;
    }

    .thumb-img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      cursor: pointer;
    }

    .status-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .status-pending { background: #ffe082; color: #b78103; }
    .status-done { background: #c8e6c9; color: #2e7d32; }
    .status-review { background: #ffcc80; color: #ef6c00; }

    textarea {
      width: 100%;
      height: 60px;
      margin-top: 8px;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-color);
      color: var(--text-color);
    }

    .target-selector {
      margin-top: 10px;
      display: flex;
      gap: 5px;
      overflow-x: auto;
      padding-bottom: 5px;
    }

    .target-chip {
      padding: 6px 12px;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      white-space: nowrap;
      cursor: pointer;
    }

    .target-chip.active { background: var(--primary-color); color: white; }

    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      z-index: 2000;
      display: none;
    }
  </style>
</head>
<body>

  <div id="toast">پیام سیستم</div>

  <header>
    <div class="header-title" id="app-title">Hamrah_Nazer</div>
    <div class="header-actions">
      <button class="btn-icon" id="theme-toggle"><i class="fas fa-moon"></i></button>
      <button class="btn-icon hidden" id="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </header>

  <div id="login-screen">
    <div class="login-container">
      <h3>ورود ناظر به سیستم</h3>
      <div class="form-group">
        <label>نام کاربری:</label>
        <input type="text" id="login-user" placeholder="نام کاربری">
      </div>
      <div class="form-group">
        <label>رمز عبور:</label>
        <input type="password" id="login-pass" placeholder="******">
      </div>
      <button class="btn-block" id="do-login">ورود</button>
    </div>
  </div>

  <div id="main-screen" class="hidden">
    <div id="workspace">
      <div id="map"></div>

      <div id="panel">
        <div id="upload-section">
          <label style="font-weight: bold; display:block; margin-bottom:8px;">Apload Excel:</label>
          <input type="file" id="excel-file" accept=".csv, .xlsx, .xls" />
          <p style="font-size:0.8rem; color:#757575;">The order of the columns: name، lon، lat، Description، img-1، img-2، img-3</p>
        </div>

        <div id="inspection-section" class="hidden">
          <div class="timer-container">
            <div>
              <span style="font-size:0.85rem; display:block; color:#757575;">زمان کل بازرسی</span>
              <div class="timer-digits" id="total-timer">00:00:00</div>
            </div>
            <div style="display:flex; gap: 5px;">
              <button class="btn-action btn-warning" id="pause-resume-btn"><i class="fas fa-pause"></i> <span>توقف</span></button>
              <button class="btn-action btn-danger" id="finish-inspection-btn"><i class="fas fa-flag-checkered"></i> خروجی نهایی PDF</button>
            </div>
          </div>

          <div class="target-selector" id="target-chips"></div>

          <div class="location-details" id="current-loc-details">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <h4 id="loc-name" style="margin:0;">لطفاً یک هدف را انتخاب کنید...</h4>
              <span class="status-badge status-pending" id="loc-status">نامشخص</span>
            </div>
            
            <p id="loc-desc" style="font-size: 0.9rem; color: #666; margin: 8px 0;"></p>
            <div class="image-gallery" id="loc-images"></div>

            <div id="inspector-inputs" class="hidden">
              <div style="display:flex; gap: 5px; margin-top: 10px; margin-bottom: 8px;">
                <button class="btn-action btn-success" onclick="updateStatus('done')"><i class="fas fa-check"></i> انجام شد</button>
                <button class="btn-action btn-warning" onclick="updateStatus('review')"><i class="fas fa-exclamation-triangle"></i> نیاز به بررسی</button>
              </div>
              <textarea id="loc-note" placeholder="یادداشت ناظر برای این لوکیشن..."></textarea>
            </div>
          </div>
          
          <button class="btn-block btn-secondary" id="reset-track-btn" style="margin-top:15px; background:#757575;">حذف مسیر فعلی و آپلود فایل جدید</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('SW Registered'))
        .catch(err => console.log('SW Failed', err));
    }

    // ==========================================
    // 🔑 پایگاه داده ناظران (تعریف نام کاربری و رمزها)
    // ==========================================
    const USERS_DATABASE = {
      "Mehdi": "2525800",
      "Ali": "2078",
    };

    let currentUser = null;
    let locations = [];
    let selectedIndex = null;
    let map, markersGroup;
    let timerInterval;
    let totalSeconds = 0;
    let isPaused = false;

    const loginScreen = document.getElementById('login-screen');
    const mainScreen = document.getElementById('main-screen');
    const logoutBtn = document.getElementById('logout-btn');
    const themeToggle = document.getElementById('theme-toggle');
    const uploadSection = document.getElementById('upload-section');
    const inspectionSection = document.getElementById('inspection-section');
    const targetChips = document.getElementById('target-chips');
    const totalTimerText = document.getElementById('total-timer');
    const pauseResumeBtn = document.getElementById('pause-resume-btn');

    // ===== THEME TOGGLE =====
    themeToggle.addEventListener('click', () => {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      themeToggle.innerHTML = newTheme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    });

    // ===== LOGIN =====
    document.getElementById('do-login').addEventListener('click', () => {
      const user = document.getElementById('login-user').value.trim();
      const pass = document.getElementById('login-pass').value;

      if(USERS_DATABASE[user] && USERS_DATABASE[user] === pass) {
        currentUser = user;
        localStorage.setItem('hamnaz_logged_user', user);
        initMainWorkspace();
      } else {
        showToast('نام کاربری یا رمز عبور اشتباه است!');
      }
    });

    window.addEventListener('load', () => {
      const savedUser = localStorage.getItem('hamnaz_logged_user');
      if(savedUser) {
        currentUser = savedUser;
        initMainWorkspace();
      }
    });

    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('hamnaz_logged_user');
      location.reload();
    });

    function initMainWorkspace() {
      loginScreen.classList.add('hidden');
      mainScreen.classList.remove('hidden');
      logoutBtn.classList.remove('hidden');
      
      initMap();
      
      // بازیابی هوشمند حافظه مسیر نیمه‌کاره روزهای قبل
      const savedData = localStorage.getItem(`hamnaz_track_${currentUser}`);
      if(savedData) {
        const parsed = JSON.parse(savedData);
        locations = parsed.locations || [];
        totalSeconds = parsed.totalSeconds || 0;
        if(locations.length > 0) {
          renderWorkspace();
          startTimer();
        }
      }
    }

    function initMap() {
      if (map) return;
      map = L.map('map', { zoomControl: false }).setView([35.6892, 51.3890], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      markersGroup = L.layerGroup().addTo(map);
    }

    // ===== EXCEL =====
    document.getElementById('excel-file').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
        processExcelData(json);
      };
      reader.readAsArrayBuffer(file);
    });

    function processExcelData(rows) {
      locations = [];
      const startIdx = isNaN(rows[0][1]) ? 1 : 0;
      
      for(let i = startIdx; i < rows.length; i++) {
        const r = rows[i];
        if(!r[0] || !r[1] || !r[2]) continue;
        locations.push({
          id: 'loc_' + i,
          name: r[0],
          lat: parseFloat(r[1]),
          lon: parseFloat(r[2]),
          desc: r[3] || 'بدون توضیحات',
          img1: r[4] || '',
          img2: r[5] || '',
          img3: r[6] || '',
          status: 'pending',
          note: ''
        });
      }
      
      if(locations.length > 0) {
        saveProgressLocally();
        renderWorkspace();
        startTimer();
      } else {
        showToast('فرمت فایل اکسل معتبر نیست!');
      }
    }

    function saveProgressLocally() {
      if(!currentUser) return;
      localStorage.setItem(`hamnaz_track_${currentUser}`, JSON.stringify({
        locations: locations,
        totalSeconds: totalSeconds
      }));
    }

    // ===== RENDER =====
    function renderWorkspace() {
      uploadSection.classList.add('hidden');
      inspectionSection.classList.remove('hidden');
      markersGroup.clearLayers();
      targetChips.innerHTML = '';

      locations.forEach((loc, idx) => {
        const chip = document.createElement('div');
        chip.className = `target-chip ${selectedIndex === idx ? 'active' : ''}`;
        chip.innerText = loc.name;
        chip.addEventListener('click', () => selectLocation(idx));
        targetChips.appendChild(chip);

        let markerColor = '#ffe082'; 
        if(loc.status === 'done') markerColor = '#4caf50'; 
        if(loc.status === 'review') markerColor = '#ff9800'; 

        const customMarker = L.divIcon({
          html: `<i class="fas fa-map-marker-alt" style="color: ${markerColor}; font-size: 26px; filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.4));"></i>`,
          className: 'custom-pin',
          iconSize: [26, 26],
          iconAnchor: [13, 26]
        });

        const marker = L.marker([loc.lat, loc.lon], { icon: customMarker }).addTo(markersGroup);
        marker.on('click', () => selectLocation(idx));
      });

      if(selectedIndex !== null) {
        updateDetailPanel();
      } else if(locations.length > 0) {
        const bounds = locations.map(l => [l.lat, l.lon]);
        map.fitBounds(bounds, { padding: [40, 40] });
      }
    }

    function selectLocation(idx) {
      selectedIndex = idx;
      renderWorkspace();
      const loc = locations[idx];
      map.setView([loc.lat, loc.lon], 16);
    }

    function updateDetailPanel() {
      const loc = locations[selectedIndex];
      document.getElementById('loc-name').innerText = loc.name;
      document.getElementById('loc-desc').innerText = "توضیحات: " + loc.desc;
      
      const statusBadge = document.getElementById('loc-status');
      statusBadge.innerText = loc.status === 'done' ? 'انجام شده' : (loc.status === 'review' ? 'نیازمند بررسی' : 'در انتظار بازرسی');
      statusBadge.className = `status-badge status-${loc.status}`;

      // رندر گالری تصاویر محلی
      const imgGallery = document.getElementById('loc-images');
      imgGallery.innerHTML = '';
      [loc.img1, loc.img2, loc.img3].forEach(url => {
        if(url && url.toString().trim() !== '') {
          const img = document.createElement('img');
          img.src = url;
          img.className = 'thumb-img';
          img.onerror = () => { img.style.display = 'none'; }; // خطای لینک خراب
          img.onclick = () => window.open(url, '_blank');
          imgGallery.appendChild(img);
        }
      });

      document.getElementById('inspector-inputs').classList.remove('hidden');
      const noteArea = document.getElementById('loc-note');
      noteArea.value = loc.note || '';
      
      noteArea.oninput = (e) => {
        locations[selectedIndex].note = e.target.value;
        saveProgressLocally();
      };
    }

    function updateStatus(newStatus) {
      if(selectedIndex === null) return;
      locations[selectedIndex].status = newStatus;
      locations[selectedIndex].note = document.getElementById('loc-note').value;
      saveProgressLocally();
      renderWorkspace();
      showToast('ثبت شد');
    }

    // ===== TIMER =====
    function startTimer() {
      if(timerInterval) return;
      timerInterval = setInterval(() => {
        if(!isPaused) {
          totalSeconds++;
          renderTimerDigits();
          if(totalSeconds % 5 === 0) saveProgressLocally();
        }
      }, 1000);
    }

    function renderTimerDigits() {
      const hrs = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
      const mins = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
      const secs = String(totalSeconds % 60).padStart(2, '0');
      totalTimerText.innerText = `${hrs}:${mins}:${secs}`;
    }

    pauseResumeBtn.addEventListener('click', () => {
      isPaused = !isPaused;
      if(isPaused) {
        pauseResumeBtn.innerHTML = '<i class="fas fa-play"></i> <span>ادامه</span>';
        pauseResumeBtn.className = "btn-action btn-success";
      } else {
        pauseResumeBtn.innerHTML = '<i class="fas fa-pause"></i> <span>توقف</span>';
        pauseResumeBtn.className = "btn-action btn-warning";
      }
    });

    document.getElementById('reset-track-btn').addEventListener('click', () => {
      if(confirm('آیا کل پیشرفت پاک شده و مسیر جدید بارگذاری شود؟')) {
        localStorage.removeItem(`hamnaz_track_${currentUser}`);
        location.reload();
      }
    });

    // ===== PDF GENERATION =====
    document.getElementById('finish-inspection-btn').addEventListener('click', () => {
      saveProgressLocally();
      generatePDFReport();
    });

    function generatePDFReport() {
      showToast('در حال صدور PDF...');
      
      const element = document.createElement('div');
      element.style.padding = '25px';
      element.style.direction = 'rtl';
      element.style.fontFamily = 'Vazirmatn, sans-serif';

      let rowsHtml = '';
      locations.forEach((loc, i) => {
        let statusText = loc.status === 'done' ? 'انجام شده' : (loc.status === 'review' ? 'نیاز به بررسی' : 'بازرسی نشده');
        let statusColor = loc.status === 'done' ? '#2e7d32' : (loc.status === 'review' ? '#ef6c00' : '#757575');
        rowsHtml += `
          <tr style="border-bottom: 1px solid #e0e0e0;">
            <td style="padding:12px; text-align:right; font-weight:bold;">${i+1}. ${loc.name}</td>
            <td style="padding:12px; text-align:center; color:${statusColor}; font-weight:bold;">${statusText}</td>
            <td style="padding:12px; text-align:right; font-size:0.9rem;">${loc.note || '—'}</td>
          </tr>
        `;
      });

      element.innerHTML = `
        <div style="border: 2px solid #1565c0; padding:20px; border-radius:8px;">
          <h2 style="text-align:center; color:#1565c0; margin-top:0;">گزارش رسمی عملیات بازرسی میدانی</h2>
          <div style="display:flex; justify-content:space-between; margin-bottom:20px; border-bottom:1px solid #ccc; padding-bottom:10px;">
            <span><b>ناظر عملیات:</b> ${currentUser}</span>
            <span><b>زمان کل صرف شده:</b> ${totalTimerText.innerText}</span>
          </div>
          <table style="width:100%; border-collapse: collapse;">
            <thead>
              <tr style="background-color:#1565c0; color:white;">
                <th style="padding:12px; text-align:right; width:30%;">موقعیت / دکل</th>
                <th style="padding:12px; text-align:center; width:25%;">وضعیت نهایی</th>
                <th style="padding:12px; text-align:right; width:45%;">مشاهدات و گزارش مکتوب ناظر</th>
              </tr>
            </thead>
            <tbody>
              ${rowsHtml}
            </tbody>
          </table>
        </div>
      `;

      const opt = {
        margin:       10,
        filename:     `Report_${currentUser}_${new Date().toISOString().slice(0,10)}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      html2pdf().from(element).set(opt).save().then(() => {
        showToast('📄 فایل PDF با موفقیت ذخیره شد.');
      });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 3000);
    }
  </script>
</body>
</html>
